name: Benchmarks

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - '.github/workflows/benchmarks.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - '.github/workflows/benchmarks.yml'

jobs:
  benchmarks:
    name: benchmarks
    runs-on: ubuntu-latest
    # Guard against the suite silently ballooning again: fail fast instead of
    # burning the full 6h GitHub ceiling. The PR path runs the leaned core suite
    # twice (PR head + main base, same-runner A/B) in ~75 min; this ~2x budget
    # tolerates hosted-runner variance while still catching a real regression
    # (the old Job.Default x2 suite took ~3h per pass and the PR A/B was cancelled
    # at the 6h ceiling on every run — #217).
    timeout-minutes: 150

    permissions:
      contents: write
      pull-requests: write

    defaults:
      run:
        working-directory: src

    steps:
      # NOTE: do NOT add `filter: tree:0` here. A blobless partial clone makes the
      # repo advertise every commit as "have" while missing the underlying objects,
      # which breaks github-action-benchmark's own `git fetch origin gh-pages:gh-pages`
      # with "missing blob object … did not send all necessary objects" and aborts the
      # gh-pages publish (#217). fetch-depth: 0 (full history) is required for the PR
      # path's `git worktree add <base-sha>` and for the action's gh-pages handling.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run benchmarks
        # working-directory must be the project folder, not src/. BenchmarkDotNet
        # writes its artifacts to ./BenchmarkDotNet.Artifacts relative to the
        # process CWD, and downstream steps look for them under Celerity.Benchmarks/.
        working-directory: src/Celerity.Benchmarks
        run: dotnet run --configuration Release -- --ci

      - name: Stage benchmark report
        # BenchmarkDotNet's joined-run JSON is named with a timestamp
        # (BenchmarkRun-joined-<ts>-report-full.json). Copy it to a stable path
        # so downstream steps can pick it up without a glob.
        run: |
          set -euo pipefail
          report=$(ls Celerity.Benchmarks/BenchmarkDotNet.Artifacts/results/*-report-full.json | head -n 1)
          echo "Found report: $report"
          cp "$report" Celerity.Benchmarks/BenchmarkDotNet.Artifacts/results/ci-report-full.json

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: src/Celerity.Benchmarks/BenchmarkDotNet.Artifacts/**
          if-no-files-found: warn
          retention-days: 30

      # ----- PR path: same-runner A/B vs main, then comment -----
      # GitHub-hosted runners vary in hardware by 20-50% run-to-run, so
      # comparing absolute timings against a stored gh-pages baseline produces
      # noise-dominated false positives. Instead we build and benchmark BOTH
      # the PR head and the main tip back-to-back on THIS runner, so hardware
      # variance cancels out and the delta reflects the code change alone.

      - name: Stage PR report
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          cp Celerity.Benchmarks/BenchmarkDotNet.Artifacts/results/ci-report-full.json /tmp/pr-report-full.json
          echo "PR report staged ($(wc -c < /tmp/pr-report-full.json) bytes)"

      - name: Run base (main) benchmarks on the same runner
        if: github.event_name == 'pull_request'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          git fetch origin main
          BASE_SHA=$(git rev-parse origin/main)
          echo "BASE_SHA=$BASE_SHA" >> "$GITHUB_ENV"
          echo "Benchmarking base (main) at $BASE_SHA"
          git worktree add /tmp/base-tree "$BASE_SHA"
          cd /tmp/base-tree/src/Celerity.Benchmarks
          dotnet run --configuration Release -- --ci
          report=$(ls BenchmarkDotNet.Artifacts/results/*-report-full.json | head -n 1)
          cp "$report" /tmp/base-report-full.json
          echo "Base report staged: $report"

      - name: Post benchmark comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          ALERT_THRESHOLD_RATIO: '1.10'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const pr = JSON.parse(fs.readFileSync('/tmp/pr-report-full.json', 'utf8'));
            const base = JSON.parse(fs.readFileSync('/tmp/base-report-full.json', 'utf8'));

            // Index base results by full benchmark name.
            const baseMap = new Map();
            for (const b of base.Benchmarks) {
              baseMap.set(b.FullName, b.Statistics);
            }

            const formatNs = (ns) => {
              if (ns == null) return 'n/a';
              if (ns < 1000) return `${ns.toFixed(1)} ns`;
              if (ns < 1_000_000) return `${(ns/1000).toFixed(2)} μs`;
              if (ns < 1_000_000_000) return `${(ns/1_000_000).toFixed(2)} ms`;
              return `${(ns/1_000_000_000).toFixed(2)} s`;
            };

            const threshold = parseFloat(process.env.ALERT_THRESHOLD_RATIO);
            const thresholdPct = ((threshold - 1) * 100).toFixed(0);
            // Each entry: { name, isHasher, prCell, stdCell, baseCell, deltaCell, flag }
            // where flag is 'regression' | 'improvement' | null.
            const entries = [];
            let regressions = 0;
            let improvements = 0;

            for (const b of pr.Benchmarks) {
              const name = b.FullName;
              const prMean = b.Statistics.Mean;
              const prStdDev = b.Statistics.StandardDeviation;
              const baseStats = baseMap.get(name);
              let deltaCell = '🆕 new';
              let flag = null;
              if (baseStats) {
                const baseMean = baseStats.Mean;
                const baseStdDev = baseStats.StandardDeviation;
                const ratio = prMean / baseMean;
                const pct = (ratio - 1) * 100;
                const sign = pct >= 0 ? '+' : '';
                deltaCell = `${sign}${pct.toFixed(1)}%`;
                // Flag only when the change clears the threshold AND exceeds the
                // combined run-to-run noise of both measurements.
                const beyondNoise = Math.abs(prMean - baseMean) > (prStdDev + baseStdDev);
                if (ratio >= threshold && beyondNoise) {
                  deltaCell += ' ⚠️';
                  flag = 'regression';
                  regressions++;
                } else if (ratio <= (1 / threshold) && beyondNoise) {
                  deltaCell += ' ✅';
                  flag = 'improvement';
                  improvements++;
                }
              }
              entries.push({
                name,
                // Hasher throughput benchmarks (StringHasherBenchmark,
                // IntegerHasherBenchmark) get their own section; everything else
                // is a collection benchmark.
                isHasher: /Hasher/.test(name),
                prCell: formatNs(prMean),
                stdCell: formatNs(prStdDev),
                baseCell: baseStats ? formatNs(baseStats.Mean) : 'n/a',
                deltaCell,
                flag,
              });
            }

            let subtitle;
            if (regressions > 0) {
              subtitle = `${regressions} regression${regressions === 1 ? '' : 's'} ⚠️ vs main` +
                (improvements > 0 ? `, ${improvements} improvement${improvements === 1 ? '' : 's'} ✅` : '') +
                ` (rows past ±${thresholdPct}% beyond noise).`;
            } else if (improvements > 0) {
              subtitle = `No regressions — ${improvements} improvement${improvements === 1 ? '' : 's'} ✅ vs main.`;
            } else {
              subtitle = `No significant change vs main (all within ±${thresholdPct}% or noise).`;
            }

            const baseSha = (process.env.BASE_SHA || '').slice(0, 7);
            const footer = `<sub>Same-runner A/B: main (\`${baseSha}\`) and this PR were built and benchmarked back-to-back on the same runner, so hardware variance cancels out. ⚠️ = PR mean ≥ +${thresholdPct}% slower than main and beyond combined std-dev; ✅ = correspondingly faster.</sub>`;

            const header = ['| Benchmark | This PR | StdDev | main | Δ |', '|---|---:|---:|---:|---:|'];
            const toRow = (e) => `| \`${e.name}\` | ${e.prCell} | ${e.stdCell} | ${e.baseCell} | ${e.deltaCell} |`;

            // A collapsible section per benchmark family, collapsed by default so
            // the (often large) tables stay below the fold.
            const section = (title, list) => {
              if (list.length === 0) return [];
              return [
                '<details>',
                `<summary><b>${title}</b> (${list.length})</summary>`,
                '',
                ...header,
                ...list.map(toRow),
                '</details>',
                '',
              ];
            };

            // Highlights: only the flagged rows stay above the fold so reviewers
            // see what actually moved without expanding either table.
            const flagged = entries.filter(e => e.flag);
            const highlights = flagged.length === 0 ? [] : [
              '**Highlights**',
              '',
              ...header,
              ...flagged.map(toRow),
              '',
            ];

            const collections = entries.filter(e => !e.isHasher);
            const hashers = entries.filter(e => e.isHasher);

            const marker = '<!-- celerity-benchmarks-comment -->';
            const body = [
              marker,
              '## Benchmarks',
              '',
              subtitle,
              '',
              ...highlights,
              ...section('Collections', collections),
              ...section('Hashers', hashers),
              footer,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info('Created new benchmarks comment');
            }

      # ----- Main path: publish to gh-pages, no comment -----

      - name: Publish to gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Celerity Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: src/Celerity.Benchmarks/BenchmarkDotNet.Artifacts/results/ci-report-full.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          comment-on-alert: false
          comment-always: false
          summary-always: true
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench

      - name: Sync custom dashboard to gh-pages
        # Runs only on main push (same gate as the action's auto-push).
        # Copies web/index.html + web/dev/bench/index.html into gh-pages,
        # leaving the action-managed data.js untouched. Idempotent.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages gh-pages
          cp web/index.html /tmp/gh-pages/index.html
          mkdir -p /tmp/gh-pages/dev/bench
          cp web/dev/bench/index.html /tmp/gh-pages/dev/bench/index.html
          cp web/dev/bench/detail.html /tmp/gh-pages/dev/bench/detail.html
          cd /tmp/gh-pages
          if git diff --quiet && git diff --cached --quiet; then
            echo "No dashboard changes to sync"
            exit 0
          fi
          git -c user.name="github-actions" -c user.email="github-actions@github.com" \
            add index.html dev/bench/index.html dev/bench/detail.html
          git -c user.name="github-actions" -c user.email="github-actions@github.com" \
            commit -m "Sync custom dashboard from ${GITHUB_SHA:0:7}"
          git push origin gh-pages
