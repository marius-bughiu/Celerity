name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: src/TestResults/*.trx
          if-no-files-found: warn
          retention-days: 7

  benchmarks:
    name: benchmarks
    runs-on: ubuntu-latest
    needs: build-and-test

    permissions:
      contents: write
      pull-requests: write

    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run benchmarks
        # working-directory must be the project folder, not src/. BenchmarkDotNet
        # writes its artifacts to ./BenchmarkDotNet.Artifacts relative to the
        # process CWD, and downstream steps look for them under Celerity.Benchmarks/.
        working-directory: src/Celerity.Benchmarks
        run: dotnet run --configuration Release -- --ci

      - name: Stage benchmark report
        # BenchmarkDotNet's joined-run JSON is named with a timestamp
        # (BenchmarkRun-joined-<ts>-report-full.json). Copy it to a stable path
        # so github-action-benchmark can pick it up without a glob.
        run: |
          set -euo pipefail
          report=$(ls Celerity.Benchmarks/BenchmarkDotNet.Artifacts/results/*-report-full.json | head -n 1)
          echo "Found report: $report"
          cp "$report" Celerity.Benchmarks/BenchmarkDotNet.Artifacts/results/ci-report-full.json

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: src/Celerity.Benchmarks/BenchmarkDotNet.Artifacts/**
          if-no-files-found: warn
          retention-days: 30

      - name: Publish & alert on regression
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Celerity Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: src/Celerity.Benchmarks/BenchmarkDotNet.Artifacts/results/ci-report-full.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.event_name == 'push' }}
          alert-threshold: '200%'
          fail-on-alert: true
          comment-on-alert: true
          summary-always: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
